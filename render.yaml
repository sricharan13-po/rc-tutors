services:
  - type: web
    name: rc-tutors
    env: node
    plan: free
    buildCommand: npm --prefix frontend install && npm --prefix frontend run build && npm --prefix mock-server install
    startCommand: node mock-server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # Persistent database — Supabase (or any Postgres) connection string.
      # Without this, data resets whenever the free instance restarts.
      # Get it from Supabase → Project Settings → Database → Connection string (URI).
      - key: DATABASE_URL
        sync: false
      # Razorpay keys — use rzp_live_... keys only once your account is approved
      # for Live Mode. Test keys (rzp_test_...) are fine for trying things out.
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      # From Razorpay Dashboard → Settings → Webhooks, after adding the webhook URL.
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      # Lock the API to your real domain once you have one, e.g. https://rctutors.com
      - key: CORS_ORIGIN
        sync: false
      # SIMPLE option: one shared Google Meet link for all classes. Create it at
      # meet.google.com ("Create a meeting for later") and paste it here. Takes
      # priority over the Google Calendar API option below.
      - key: GOOGLE_MEET_LINK
        sync: false
      # ADVANCED option: Google Calendar API auto-generates a real Meet link per
      # class. Needs an 18+ Google account (Google Cloud has an age requirement).
      # See README "Google Meet setup". Leave blank if using GOOGLE_MEET_LINK above.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      # A password you make up yourself, used once to protect the one-time
      # /admin/google/connect link (not a student/tutor login).
      - key: ADMIN_SETUP_TOKEN
        sync: false
